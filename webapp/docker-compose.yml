services:
  postgresql:
    image: postgres:16
    container_name: press-release-db
    environment:
      POSTGRES_USER: press_release
      POSTGRES_PASSWORD: press_release
      POSTGRES_DB: press_release_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U press_release"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./node  # Default: PHP. Change to ./python or ./go as needed
    container_name: press-release-app
    ports:
      - "8080:8080"
    volumes:
      - ./node:/app
      - node_modules:/app/node_modules
    environment:
      PORT: 8080
      DB_HOST: postgresql
      DB_PORT: 5432
      DB_USER: press_release
      DB_PASSWORD: press_release
      DB_NAME: press_release_db
    command: sh -c "npm install && npm run dev"
    depends_on:
      postgresql:
        condition: service_healthy

  flask_app:
    build: ./python
    container_name: press-release-flask
    ports:
      - "5000:5000"
    volumes:
      - ./python:/app
    environment:
      FLASK_APP: app.py # 実際のFlaskのエントリーポイントファイル名に合わせて変更してください
      FLASK_ENV: development
      DB_HOST: postgresql
      DB_PORT: 5432
      DB_USER: press_release
      DB_PASSWORD: press_release
      DB_NAME: press_release_db
    # requirements.txtをインストール後、0.0.0.0で起動し外部からのアクセスを許可します
    command: sh -c "pip install -r requirements.txt && flask run --host=0.0.0.0 --port=5000"
    depends_on:
      postgresql:
        condition: service_healthy

volumes:
  postgres_data:
  node_modules: