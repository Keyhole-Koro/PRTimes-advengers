services:
  postgresql:
    image: postgres:16
    container_name: press-release-db
    environment:
      POSTGRES_USER: press_release
      POSTGRES_PASSWORD: press_release
      POSTGRES_DB: press_release_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U press_release"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./node  # Default: PHP. Change to ./python or ./go as needed
    container_name: press-release-app
    ports:
      - "8080:8080"
    volumes:
      - ./node:/app
      - node_modules:/app/node_modules
    environment:
      PORT: 8080
      DB_HOST: postgresql
      DB_PORT: 5432
      DB_USER: press_release
      DB_PASSWORD: press_release
      DB_NAME: press_release_db
    command: sh -c "npm install && npm run dev"
    depends_on:
      postgresql:
        condition: service_healthy

  agent:
    build: ./agent
    container_name: press-release-agent
    ports:
      - "5001:5000"
    volumes:
      - ./agent:/app
    environment:
      PORT: 5000
      FLASK_APP: app.py
      FLASK_ENV: development
      AGENT_MODEL: ${AGENT_MODEL:-gemini-2.5-flash}
      AGENT_APP_NAME: press-release-agent
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    command: sh -c "pip install -r requirements.txt && python main.py"

volumes:
  postgres_data:
  node_modules:
