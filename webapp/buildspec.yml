version: 0.2

phases:
  install:
    commands:
      - cd webapp/frontend/react
      - npm install
  build:
    commands:
      - cd webapp/frontend/react
      - npm run build
  post_build:
    commands:
      # ホスティング用S3バケットに直接コピー
      - aws s3 sync webapp/frontend/react/dist s3://pr-times-4/ --delete

artifacts:
  base-directory: webapp
  files:
    - '**/*'