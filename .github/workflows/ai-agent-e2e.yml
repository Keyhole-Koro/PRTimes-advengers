name: AI Agent E2E

on:
  pull_request:
    paths:
      - ".github/workflows/ai-agent-e2e.yml"
      - "webapp/agent/**"
      - "webapp/node/**"
      - "webapp/frontend/react/**"
      - "webapp/docker-compose.yml"
      - "webapp/sql/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ai-agent-e2e.yml"
      - "webapp/agent/**"
      - "webapp/node/**"
      - "webapp/frontend/react/**"
      - "webapp/docker-compose.yml"
      - "webapp/sql/**"
  workflow_dispatch:

jobs:
  ai-agent-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      AGENT_MODEL: gemini-2.5-flash
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gemini secret
        run: |
          if [ -z "${GOOGLE_API_KEY}" ]; then
            echo "GEMINI_API_KEY is not configured."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            webapp/node/package-lock.json
            webapp/frontend/react/package-lock.json

      - name: Start backend stack
        working-directory: webapp
        run: |
          docker compose up -d --build postgresql agent app

      - name: Wait for backend readiness
        run: |
          for url in http://127.0.0.1:5001/health http://127.0.0.1:8080/health; do
            for i in {1..60}; do
              if curl -fsS "$url" >/dev/null; then
                break
              fi
              sleep 2
              if [ "$i" -eq 60 ]; then
                echo "Timed out waiting for $url"
                exit 1
              fi
            done
          done

      - name: Install frontend dependencies
        working-directory: webapp/frontend/react
        run: npm ci

      - name: Install Playwright browsers
        working-directory: webapp/frontend/react
        run: npx playwright install --with-deps chromium

      - name: Start frontend
        working-directory: webapp/frontend/react
        run: |
          npm run dev -- --host 0.0.0.0 > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid

      - name: Wait for frontend readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5173 >/dev/null; then
              break
            fi
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "Timed out waiting for frontend"
              exit 1
            fi
          done

      - name: Run AI agent E2E tests
        working-directory: webapp/frontend/react
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            webapp/frontend/react/playwright-report
            webapp/frontend/react/test-results

      - name: Print logs on failure
        if: failure()
        working-directory: webapp
        run: |
          echo "--- frontend log ---"
          cat /tmp/frontend.log || true
          echo "--- docker compose ps ---"
          docker compose ps
          echo "--- app logs ---"
          docker compose logs app || true
          echo "--- agent logs ---"
          docker compose logs agent || true
          echo "--- postgres logs ---"
          docker compose logs postgresql || true

      - name: Stop services
        if: always()
        working-directory: webapp
        run: |
          if [ -f /tmp/frontend.pid ]; then
            kill "$(cat /tmp/frontend.pid)" || true
          fi
          docker compose down -v
